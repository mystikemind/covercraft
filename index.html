<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoverCrafting — Free AI Cover Letter Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --border: #e4e0db;
      --bg: #faf9f7;
      --surface: #ffffff;
      --accent: #2c5f2e;
      --accent-light: #eef4ee;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    .logo span { color: var(--accent); }

    .badge {
      font-size: 11px;
      font-weight: 500;
      background: var(--accent-light);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    main {
      max-width: 780px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-weight: 300;
      font-size: 1rem;
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .fields { display: flex; flex-direction: column; gap: 1rem; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    @media (max-width: 560px) { .row { grid-template-columns: 1fr; } }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
      color: var(--ink);
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      background: var(--surface);
    }

    textarea { min-height: 100px; }

    .tone-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tone-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }

    .tone-btn:hover { border-color: var(--accent); color: var(--accent); }

    .tone-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .generate-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .generate-btn:hover:not(:disabled) { opacity: 0.88; }
    .generate-btn:active:not(:disabled) { transform: scale(0.99); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .output-area { display: none; }
    .output-area.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      transition: all 0.15s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    #output-text {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.85;
      color: var(--ink);
      min-height: 200px;
    }

    .streaming-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .error-msg {
      color: #c0392b;
      font-size: 13px;
      margin-top: 0.75rem;
      display: none;
    }

    .limit-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-top: 0.6rem;
    }

    .uses-left {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 2rem;
      border-top: 1px solid var(--border);
    }

    /* Loading spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<header>
  <div class="logo">Cover<span>Crafting</span></div>
  <div class="badge">Free · AI-Powered</div>
</header>

<main>
  <div class="hero">
    <h1>Cover letters that<br/><em>actually get read</em></h1>
    <p class="subtitle">Fill in a few details and get a tailored, professional cover letter in seconds.</p>
  </div>

  <!-- Form Card -->
  <div class="card">
    <div class="card-title">Your details</div>
    <div class="fields">
      <div class="row">
        <div>
          <label for="name">Your Name</label>
          <input type="text" id="name" placeholder="Jane Smith" />
        </div>
        <div>
          <label for="role">Job Title Applying For</label>
          <input type="text" id="role" placeholder="Senior Product Manager" />
        </div>
      </div>
      <div class="row">
        <div>
          <label for="company">Company Name</label>
          <input type="text" id="company" placeholder="Acme Corp" />
        </div>
        <div>
          <label for="years">Years of Experience</label>
          <input type="text" id="years" placeholder="5 years" />
        </div>
      </div>
      <div>
        <label for="skills">Key Skills / Achievements</label>
        <textarea id="skills" placeholder="e.g. Led a team of 10, launched 3 products, increased revenue by 40%, expert in Python and SQL..."></textarea>
      </div>
      <div>
        <label for="why">Why this company? (optional)</label>
        <input type="text" id="why" placeholder="e.g. I admire their focus on sustainability and innovation..." />
      </div>
    </div>
  </div>

  <!-- Tone Card -->
  <div class="card">
    <div class="card-title">Tone</div>
    <div class="tone-group">
      <button class="tone-btn active" data-tone="Professional">Professional</button>
      <button class="tone-btn" data-tone="Friendly">Friendly</button>
      <button class="tone-btn" data-tone="Confident">Confident</button>
      <button class="tone-btn" data-tone="Enthusiastic">Enthusiastic</button>
      <button class="tone-btn" data-tone="Concise">Concise</button>
    </div>
  </div>

  <!-- Generate Button -->
  <button class="generate-btn" id="gen-btn" onclick="generate()">
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">✦ Generate Cover Letter</span>
  </button>
  <div class="limit-bar">
    <span>Free usage</span>
    <span class="uses-left" id="uses-display">5 uses left today</span>
  </div>
  <div class="error-msg" id="error-msg"></div>

  <!-- Output Card -->
  <div class="card output-area fade-in" id="output-area" style="margin-top:1.5rem;">
    <div class="output-header">
      <div class="card-title" style="margin-bottom:0">Your Cover Letter</div>
      <button class="copy-btn" id="copy-btn" onclick="copyText()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Copy
      </button>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:1rem 0"/>
    <div id="output-text"></div>
  </div>
</main>

<footer>
  CoverCrafting · Free AI Cover Letter Generator · No account needed
</footer>

<script>
  // --- Freemium usage limit (localStorage-based) ---
  const LIMIT = 5;
  function getUsage() {
    const today = new Date().toDateString();
    const stored = JSON.parse(localStorage.getItem('cc_usage') || '{"date":"","count":0}');
    if (stored.date !== today) return 0;
    return stored.count;
  }
  function incrementUsage() {
    const today = new Date().toDateString();
    const count = getUsage() + 1;
    localStorage.setItem('cc_usage', JSON.stringify({ date: today, count }));
  }
  function updateUsageDisplay() {
    const left = Math.max(0, LIMIT - getUsage());
    document.getElementById('uses-display').textContent = `${left} use${left !== 1 ? 's' : ''} left today`;
    if (left === 0) {
      document.getElementById('gen-btn').disabled = true;
      document.getElementById('uses-display').style.background = '#fdecea';
      document.getElementById('uses-display').style.color = '#c0392b';
    }
  }
  updateUsageDisplay();

  // --- Tone selection ---
  let selectedTone = 'Professional';
  document.querySelectorAll('.tone-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedTone = btn.dataset.tone;
    });
  });

  // --- Generate ---
  async function generate() {
    if (getUsage() >= LIMIT) {
      showError("You've used all 5 free generations today. Come back tomorrow!");
      return;
    }

    const name = document.getElementById('name').value.trim();
    const role = document.getElementById('role').value.trim();
    const company = document.getElementById('company').value.trim();
    const years = document.getElementById('years').value.trim();
    const skills = document.getElementById('skills').value.trim();
    const why = document.getElementById('why').value.trim();

    if (!name || !role || !company || !skills) {
      showError('Please fill in Name, Job Title, Company, and Skills.');
      return;
    }

    hideError();
    setLoading(true);

    const prompt = `Write a ${selectedTone.toLowerCase()} cover letter for ${name} applying for the role of ${role} at ${company}.
Experience: ${years || 'not specified'}.
Key skills and achievements: ${skills}.
${why ? `Reason for interest in this company: ${why}.` : ''}

Guidelines:
- 3–4 paragraphs, no longer than 350 words
- Do NOT use generic filler phrases like "I am writing to express my interest"
- Start with a compelling opening line
- Sound like a real, confident human wrote it
- Do NOT include subject lines or "Dear Hiring Manager" headers — start directly with the body
- End with a confident closing paragraph and sign off as ${name}`;

    const outputEl = document.getElementById('output-text');
    const outputArea = document.getElementById('output-area');
    outputEl.textContent = '';
    outputArea.classList.add('visible');
    outputArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

    let cursor = document.createElement('span');
    cursor.className = 'streaming-cursor';
    outputEl.appendChild(cursor);

    try {
      const response = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          max_tokens: 1000,
          stream: true,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      if (!response.ok) throw new Error('API error');

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
        for (const line of lines) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            if (json.choices?.[0]?.delta?.content) {
              fullText += json.choices[0].delta.content;
              outputEl.textContent = fullText;
              outputEl.appendChild(cursor);
            }
          } catch {}
        }
      }

      cursor.remove();
      outputEl.textContent = fullText;
      incrementUsage();
      updateUsageDisplay();

    } catch (err) {
      cursor.remove();
      outputArea.classList.remove('visible');
      showError('Something went wrong. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  // --- Copy ---
  function copyText() {
    const text = document.getElementById('output-text').textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.classList.add('copied');
      btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      }, 2000);
    });
  }

  function setLoading(on) {
    document.getElementById('gen-btn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btn-text').textContent = on ? 'Generating…' : '✦ Generate Cover Letter';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-msg').style.display = 'none';
  }
</script>

</body>
</html>
